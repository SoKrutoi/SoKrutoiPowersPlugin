# ═══════════════════════════════════════
#  SoKrutoiPowersPlugin — config.yml
# ═══════════════════════════════════════

# Задержка смерти от Тетради (в секундах)
death-delay-seconds: 40

# За сколько секунд до смерти показывать слепоту + звук
death-warn-seconds: 10

# ── Взрыв ──────────────────────────────
explosion-charge-seconds: 5
explosion-power: 4.0
explosion-break-blocks: true
explosion-cooldown-seconds: 60

# ── Вор ────────────────────────────────
thief-cooldown-seconds: 110

# ── Гигант ─────────────────────────────
giant:
  level1:
    scale: 2.5
    hp-multiplier: 2.5
    reach-add: 4.0
    step-height-add: 1.0
    speed-multiplier: 0.25
    jump-strength-add: 0.2
    knockback-resistance-add: 0.3
    attack-knockback-add: 1.0
  level2:
    scale: 5.0
    hp-multiplier: 5.0
    reach-add: 9.0
    step-height-add: 2.5
    speed-multiplier: 0.6
    jump-strength-add: 0.5
    knockback-resistance-add: 0.7
    attack-knockback-add: 2.5

# ── Уменьшение ─────────────────────────
shrink:
  level1:
    scale: 0.5          # половина обычного роста
    hp-multiplier: 0.75 # половина обычных HP
  level2:
    scale: 0.15         # почти пиксель (~2 пикселя в высоту — минимум движка)
    hp-multiplier: 0.2  # четверть обычных HP

# ── За Варудо ──────────────────────────
zawarudo:
  radius: 25.0                  # радиус заморозки (блоки)
  duration-seconds: 9           # время остановки (секунды)
  cooldown-seconds: 250         # кулдаун (5 минут = 300 сек.)
  double-shift-window-ms: 400   # окно двойного шифта (мс)
  freeze-whole-server: false    # true — заморозить весь сервер, false — только в радиусе

# ── Флеш ───────────────────────────────
flash:
  speed-level: 5                # уровень Speed (1–255; стандартный максимум — 5)
  dash-velocity: 1.8            # сила рывка (множитель вектора взгляда)
  dash-cooldown-seconds: 3      # кулдаун рывка (секунды)
  step-height-bonus: 1.5        # на сколько блоков выше шагает игрок в режиме флеша
  hunger-interval-ticks: 300    # тики между потерей 1 ед. голода (300 = 15 сек.)

# ── Якорь ──────────────────────────────
anchor:
  duration-seconds: 20          # сколько секунд активна способность
  cooldown-seconds: 60          # кулдаун после возврата (секунды)
  double-shift-window-ms: 400   # окно двойного шифта (мс)
